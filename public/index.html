<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Excelência® – Seja uma Empreendedora de Sucesso</title>

  <!-- Open Graph / WhatsApp / Instagram -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Excelência® Lingerie – Seja uma Empreendedora de Sucesso" />
  <meta property="og:description" content="Venda Excelência Lingerie e conquiste sua independência financeira! Cadastre-se agora." />
  <meta property="og:image" content="https://pre-cadastro-excelencia-lingerie.vercel.app/logo.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://pre-cadastro-excelencia-lingerie.vercel.app/" />
  <meta property="og:site_name" content="Excelência® Lingerie" />

  <!-- WhatsApp usa também estas -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Excelência® Lingerie – Seja uma Empreendedora de Sucesso" />
  <meta name="twitter:description" content="Venda Excelência Lingerie e conquiste sua independência financeira!" />
  <meta name="twitter:image" content="https://pre-cadastro-excelencia-lingerie.vercel.app/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Lato',sans-serif;background:#F5EFE4;color:#2C1F0E}
    .header{padding:12px 24px;display:flex;align-items:center;justify-content:center}
    .logo{font-family:'Playfair Display',serif;font-size:22px;color:#fff;letter-spacing:4px;text-transform:uppercase;text-align:center}
    .logo span{font-size:11px;display:block;letter-spacing:8px;font-family:'Lato',sans-serif;font-weight:300}
    .logo-img{height:48px;max-width:220px;object-fit:contain}
    .hero{
  min-height: clamp(520px, 80vh, 820px);
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:60px 8% 60px 50%;
  position:relative;
  overflow:hidden;
  background-size:cover;
  background-position:top center;
  background-repeat:no-repeat;
}
    .hero.has-banner{
  background-position:top left;
  background-size:cover;
}
    .hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(to right, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.0) 55%),
    linear-gradient(to top, rgba(0,0,0,0.2) 0%, transparent 40%);
}
    .hero-text{
  text-align:center;
  z-index:1;
  max-width:500px;
}
    .hero-text h1{font-family:'Lato',sans-serif;font-weight:300;font-size:clamp(22px,3vw,32px);color:#fff;line-height:1.2}
    .hero-text em{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(32px,5vw,52px);color:#fff;display:block;line-height:1.1;text-shadow:2px 2px 20px rgba(0,0,0,0.3);white-space:pre-line}
    .hero-text p{font-family:'Lato',sans-serif;font-weight:300;font-size:clamp(16px,2vw,22px);color:#fff;margin-top:6px}
    .ticker{padding:12px 0;overflow:hidden;display:flex;gap:48px}
    .ticker-inner{display:flex;gap:48px;animation:tick 18s linear infinite;white-space:nowrap}
    .tick-item{color:#fff;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:12px}
    @keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .content{max-width:1100px;margin:0 auto;padding:64px 24px;display:grid;grid-template-columns:1fr 400px;gap:64px;align-items:start}
    @media(max-width:768px){
      .content{grid-template-columns:1fr;gap:40px}
      .hero{
        padding:32px 16px 28px;
        justify-content:center;
        align-items:flex-end;
        min-height:clamp(420px,100vw,580px);
        background-position:left center!important;
        background-size:auto 100%!important;
      }
      .hero-text{
        width:100%;
        text-align:center;
        padding:24px 16px 14px;
        border-radius:10px;
      }
    }
    .why h2{font-family:'Playfair Display',serif;font-size:26px;color:#2C1F0E;margin-bottom:28px}
    .why h2 strong{font-style:italic}
    .features{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .feature{display:flex;align-items:center;gap:12px;padding:14px 16px;background:transparent;border-radius:50px;border:1px solid #E8D5B0;transition:transform .2s,box-shadow .2s}
    .feature:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.08)}
    .feat-icon{width:46px;height:46px;min-width:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:22px}
    .feat-icon img{width:60%;height:60%;object-fit:contain}
    .feature span{font-weight:700;font-size:13px;line-height:1.3;color:#2C1F0E}
    .form-card{border-radius:12px;padding:32px 28px;box-shadow:0 16px 48px rgba(0,0,0,0.12)}
    .form-card h3{font-family:'Playfair Display',serif;font-size:18px;text-align:center;margin-bottom:20px;color:#2C1F0E}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;color:#2C1F0E}
    .field input{width:100%;padding:9px 12px;border:1.5px solid rgba(0,0,0,0.12);border-radius:6px;background:#fff;font-size:13px;font-family:'Lato',sans-serif;color:#2C1F0E;outline:none;transition:border-color .2s}
    .radio-group{margin:14px 0;font-size:12px;color:#2C1F0E}
    .radio-group p{margin-bottom:6px;font-size:11px;line-height:1.4}
    .radio-opts{display:flex;gap:20px}
    .radio-opts label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px}
    .btn-submit{width:100%;padding:13px;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:background .2s,transform .1s;font-family:'Lato',sans-serif}
    .btn-submit:hover{filter:brightness(0.85);transform:translateY(-1px)}
    .alert{padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:12px;font-weight:600}
    .alert-success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
    .alert-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
    .footer{padding:32px 24px;text-align:center;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body>

<header class="header" id="header">
  <div id="logo-header"></div>
</header>

<section class="hero" id="hero">
  <div class="hero-text">
    <h1 id="hero-titulo"></h1>
    <em id="hero-destaque"></em>
    <p id="hero-subtitulo"></p>
  </div>
</section>

<div class="ticker" id="ticker">
  <div class="ticker-inner" id="ticker-inner"></div>
</div>

<main class="content">
  <div class="why">
    <h2>Por que vender Excelência <strong id=""></strong>?</h2>
    <div id="features-cards"><div class="features" id="features"></div></div>
    <div id="features-imagem" style="display:none">
      <img id="beneficios-img" src="" alt="Benefícios" style="width:100%;max-width:560px;height:auto;display:block;" />
    </div>
  </div>

  <div class="form-card" id="form-card">
    <h3>Faça agora seu cadastro!</h3>
    <div id="alert-box"></div>
    <div class="field"><label>Nome*</label><input id="f-nome" placeholder="Seu nome completo" /></div>
    <div class="field"><label>Telefone*</label><input id="f-telefone" placeholder="(85) 99999-9999" /></div>
    <div class="field"><label>E-mail*</label><input id="f-email" type="email" placeholder="seu@email.com" /></div>
    <div class="field"><label>Estado*</label><input id="f-estado" placeholder="Ex: Ceará" /></div>
    <div class="field"><label>Cidade*</label><input id="f-cidade" placeholder="Ex: Fortaleza" /></div>
    <div class="radio-group">
      <p>Conheceu a Excelência no evento Mulheres Empreendedoras?</p>
      <div class="radio-opts">
        <label><input type="radio" name="conheceu_evento" value="sim" /> Sim</label>
        <label><input type="radio" name="conheceu_evento" value="nao" /> Não</label>
      </div>
    </div>
    <button class="btn-submit" id="btn-submit" onclick="handleSubmit()">Enviar</button>
  </div>
</main>

<footer class="footer" id="footer">
  <div id="logo-footer"></div>
</footer>

<script>
const DEFAULT = {
  logo_texto:'Excelência®', logo_subtexto:'Lingerie', logo_imagem:'',
  cor_primaria:'#C9A96E', cor_secundaria:'#A8854A', cor_destaque:'#E8D5B0',
  hero_titulo:'Seja uma', hero_destaque:'empreendedora\nde sucesso',
  hero_subtitulo:'com a Excelência Lingerie!', hero_banner_imagem:'',
  beneficio_1_titulo:'Variedade de produtos',       beneficio_1_icone:'📦', beneficio_1_imagem:'',
  beneficio_2_titulo:'Flexibilidade de horários',   beneficio_2_icone:'🕐', beneficio_2_imagem:'',
  beneficio_3_titulo:'Alta lucratividade',           beneficio_3_icone:'📈', beneficio_3_imagem:'',
  beneficio_4_titulo:'Receba seus produtos em casa', beneficio_4_icone:'🚚', beneficio_4_imagem:'',
  beneficio_5_titulo:'Marca consolidada',            beneficio_5_icone:'✅', beneficio_5_imagem:'',
  beneficio_6_titulo:'Brindes exclusivos',           beneficio_6_icone:'🎁', beneficio_6_imagem:'',
  beneficios_imagem:'', beneficios_modo:'cards',
};

let cfg = { ...DEFAULT };

function applyConfig(c) {
  cfg = { ...DEFAULT, ...c };
  const p = cfg.cor_primaria, s = cfg.cor_secundaria, d = cfg.cor_destaque;

  document.title = `${cfg.logo_texto} – Seja uma Empreendedora de Sucesso`;

  // Open Graph dinâmico
  const ogImage = cfg.logo_imagem || cfg.hero_banner_imagem || '';
  const ogTitle = `${cfg.logo_texto} – Seja uma Empreendedora de Sucesso`;
  const ogDesc  = `Venda ${cfg.logo_texto} e conquiste sua independência financeira! Cadastre-se agora.`;
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', ogTitle);
  document.querySelector('meta[property="og:description"]')?.setAttribute('content', ogDesc);
  document.querySelector('meta[property="og:image"]')?.setAttribute('content', ogImage);
  document.querySelector('meta[property="og:url"]')?.setAttribute('content', window.location.href);
  document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', ogTitle);
  document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', ogDesc);
  document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', ogImage);
  document.getElementById('header').style.background = p;
  const hero = document.getElementById('hero');

if (cfg.hero_banner_imagem) {
  hero.style.backgroundImage = `url(${cfg.hero_banner_imagem})`;
} else {
  hero.style.background = `linear-gradient(135deg,${d} 0%,${p} 40%,${s} 100%)`;
}
  document.getElementById('ticker').style.background = s;
  document.getElementById('form-card').style.background = d;
  document.getElementById('footer').style.background = p;

  // Logo
  const logoHtml = cfg.logo_imagem
    ? `<img class="logo-img" src="${cfg.logo_imagem}" alt="${cfg.logo_texto}" />`
    : `<div class="logo">✦ ${cfg.logo_texto}<span>${cfg.logo_subtexto}</span></div>`;
  document.getElementById('logo-header').innerHTML = logoHtml;
  document.getElementById('logo-footer').innerHTML = cfg.logo_imagem
    ? `<img style="height:60px;max-width:220px;object-fit:contain" src="${cfg.logo_imagem}" alt="${cfg.logo_texto}" />`
    : logoHtml;

  // Hero
  const elTit = document.getElementById('hero-titulo');
  const elDest = document.getElementById('hero-destaque');
  const elSub = document.getElementById('hero-subtitulo');
  if (elTit) elTit.textContent = cfg.hero_titulo || '';
  if (elDest) elDest.textContent = cfg.hero_destaque || '';
  if (elSub) elSub.textContent = cfg.hero_subtitulo || '';

  // Ticker
  document.getElementById('ticker-inner').innerHTML =
    Array(10).fill('<span class="tick-item">CADASTRE-SE</span>').join('');
  document.querySelectorAll('.tick-item').forEach(el => {
    el.style.setProperty('--d', d);
  });
  // tick-item::before color via style tag
  let st = document.getElementById('dyn-style');
  if (!st) { st = document.createElement('style'); st.id = 'dyn-style'; document.head.appendChild(st); }
  st.textContent = `
    .tick-item::before{content:'✦';color:${d}}
    .field input:focus{border-color:${s}!important}
    .btn-submit{background:${s}}
    .feat-icon{background:linear-gradient(135deg,${d},${p})}
    .feature{border-color:${d}}
  `;

  // Logo why
  const elWhy = document.getElementById('logo-nome-why');
  if (elWhy) elWhy.textContent = cfg.logo_texto || '';

  // Features
  const modo = cfg.beneficios_modo || 'cards';
  document.getElementById('features-cards').style.display = modo === 'cards' ? '' : 'none';
  document.getElementById('features-imagem').style.display = modo === 'imagem' ? '' : 'none';
  // Remove borda dos cards quando modo imagem
  let featStyle = document.getElementById('feat-border-style');
  if (!featStyle) { featStyle = document.createElement('style'); featStyle.id = 'feat-border-style'; document.head.appendChild(featStyle); }
  featStyle.textContent = modo === 'imagem' ? '.feature{border:none!important}' : '';

  if (modo === 'imagem' && cfg.beneficios_imagem) {
    document.getElementById('beneficios-img').src = cfg.beneficios_imagem;
  } else {
    const feats = document.getElementById('features');
    feats.innerHTML = [1,2,3,4,5,6].map(i => {
      const img = cfg[`beneficio_${i}_imagem`];
      const icon = cfg[`beneficio_${i}_icone`];
      const title = cfg[`beneficio_${i}_titulo`];
      const iconHtml = img
        ? `<img src="${img}" alt="${title}" />`
        : `<span class="feat-icon-emoji">${icon}</span>`;
      return `<div class="feature"><div class="feat-icon">${iconHtml}</div><span>${title}</span></div>`;
    }).join('');
  }

  // Banner: keep background-size when image is set
  if (cfg.hero_banner_imagem) {
    const isMobile = window.innerWidth <= 768;
    hero.style.backgroundImage = `url(${cfg.hero_banner_imagem})`;
    hero.style.backgroundSize = isMobile ? 'auto 100%' : 'cover';
    hero.style.backgroundPosition = isMobile ? 'left center' : 'top left';
    hero.style.backgroundRepeat = 'no-repeat';
    hero.classList.add('has-banner');
  } else {
    hero.style.backgroundImage = '';
    hero.style.backgroundPosition = '';
    hero.style.backgroundSize = '';
    hero.style.background = `linear-gradient(135deg,${d} 0%,${p} 40%,${s} 100%)`;
    hero.classList.remove('has-banner');
  }
}

async function handleSubmit() {
  const nome     = document.getElementById('f-nome').value.trim();
  const telefone = document.getElementById('f-telefone').value.trim();
  const email    = document.getElementById('f-email').value.trim();
  const estado   = document.getElementById('f-estado').value.trim();
  const cidade   = document.getElementById('f-cidade').value.trim();
  const radio    = document.querySelector('input[name="conheceu_evento"]:checked');
  const conheceu_evento = radio ? radio.value : '';

  const alertBox = document.getElementById('alert-box');
  const btn = document.getElementById('btn-submit');

  if (!nome || !telefone || !email || !estado || !cidade) {
    alertBox.innerHTML = '<div class="alert alert-error">⚠️ Por favor, preencha todos os campos obrigatórios.</div>';
    return;
  }

  btn.disabled = true; btn.textContent = 'Enviando...';
  alertBox.innerHTML = '';

  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, telefone, email, estado, cidade, conheceu_evento }),
    });
    const data = await res.json();
    if (res.ok) {
      alertBox.innerHTML = `<div class="alert alert-success">🎉 ${data.message}</div>`;
      ['f-nome','f-telefone','f-email','f-estado','f-cidade'].forEach(id => document.getElementById(id).value = '');
      document.querySelectorAll('input[name="conheceu_evento"]').forEach(r => r.checked = false);
    } else {
      alertBox.innerHTML = `<div class="alert alert-error">⚠️ ${data.error || 'Ocorreu um erro.'}</div>`;
    }
  } catch {
    alertBox.innerHTML = '<div class="alert alert-error">⚠️ Erro de conexão.</div>';
  }

  btn.disabled = false; btn.textContent = 'Enviar';
}

// Carregar config
fetch('/api/settings?public=1')
  .then(r => { if (!r.ok) throw new Error('not ok'); return r.json(); })
  .then(data => { if (data && typeof data === 'object') applyConfig(data); else applyConfig(DEFAULT); })
  .catch(() => applyConfig(DEFAULT));
</script>
</body>
</html>
